<!DOCTYPE html>
<html>
<head>
    <title>Walmart Sales Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        form {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 10px 15px;
            align-items: center;
        }
        input {
            padding: 8px;
        }
        button {
            grid-column: span 2;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .note {
            margin-bottom: 20px;
            color: #444;
        }
    </style>
</head>
<body>
    <h1>Walmart Weekly Sales Predictor</h1>
    <p class="note">Enter the values below and click Predict to get the estimated weekly sales.</p>

    <form id="predictionForm">
        <label for="Store">Store</label>
        <input type="number" id="Store" required>

        <label for="Holiday_Flag">Holiday_Flag</label>
        <input type="number" id="Holiday_Flag" required>

        <label for="Temperature">Temperature</label>
        <input type="number" step="any" id="Temperature" required>

        <label for="Fuel_Price">Fuel_Price</label>
        <input type="number" step="any" id="Fuel_Price" required>

        <label for="CPI">CPI</label>
        <input type="number" step="any" id="CPI" required>

        <label for="Unemployment">Unemployment</label>
        <input type="number" step="any" id="Unemployment" required>

        <label for="Year">Year</label>
        <input type="number" id="Year" required>

        <label for="Month">Month</label>
        <input type="number" id="Month" required>

        <label for="Week">Week</label>
        <input type="number" id="Week" required>

        <button type="submit">Predict</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById("predictionForm").addEventListener("submit", async function(event) {
            event.preventDefault();

            const data = {
                Store: Number(document.getElementById("Store").value),
                Holiday_Flag: Number(document.getElementById("Holiday_Flag").value),
                Temperature: Number(document.getElementById("Temperature").value),
                Fuel_Price: Number(document.getElementById("Fuel_Price").value),
                CPI: Number(document.getElementById("CPI").value),
                Unemployment: Number(document.getElementById("Unemployment").value),
                Year: Number(document.getElementById("Year").value),
                Month: Number(document.getElementById("Month").value),
                Week: Number(document.getElementById("Week").value)
            };

            const resultDiv = document.getElementById("result");
            resultDiv.innerText = "Calculating...";

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.predicted_weekly_sales !== undefined) {
                    resultDiv.innerText = "Predicted Weekly Sales: " + result.predicted_weekly_sales;
                } else {
                    resultDiv.innerText = "Error: " + (result.error || "Unknown error");
                }
            } catch (error) {
                resultDiv.innerText = "Error connecting to the service.";
            }
        });
    </script>
</body>
</html>
